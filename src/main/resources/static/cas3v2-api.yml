openapi: 3.0.1
info:
  version: 1.0.1
  title: 'Transitional Accommodation Services (CAS3 version 2)'
servers:
  - url: /cas3/v2
paths:
  /premises/{premisesId}/bookings:
    get:
      tags:
        - Operations on premises
      summary: Returns all bookings for cas3 premises
      operationId: premisesPremisesIdBookingsGet
      parameters:
        - name: premisesId
          in: path
          description: ID of the premises to get bookings for
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: successful operation
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: 'cas3-schemas.yml#/components/schemas/Cas3Booking'
    post:
      tags:
        - Operations on premises
      summary: Adds a new booking for CAS3
      operationId: premisesPremisesIdBookingsPost
      parameters:
        - name: premisesId
          in: path
          description: ID of the premises to create a booking for
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '_shared.yml#/components/schemas/NewBooking'
        required: true
      responses:
        200:
          description: successful operation
          content:
            'application/json':
              schema:
                $ref: 'cas3-schemas.yml#/components/schemas/Cas3Booking'
        400:
          description: invalid params
          content:
            'application/problem+json':
              schema:
                $ref: '_shared.yml#/components/schemas/ValidationError'
        404:
          description: invalid premises ID
          content:
            'application/json':
              schema:
                $ref: '_shared.yml#/components/schemas/Problem'
        409:
          description: An existing booking for the given bed has overlapping dates
          content:
            'application/json':
              schema:
                $ref: '_shared.yml#/components/schemas/Problem'
      x-codegen-request-body-name: body
